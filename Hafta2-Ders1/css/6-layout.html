<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example - Layout</title>

    <style>
        .navbar{
            background-color: darkslategrey;
            height: 100px;
        }

        .navbar.img{
            width: 100px;
        }
        .navbar.ul{
            display: flex;
        }

        .navbar.li{
            list-style: none;
            margin-right: 20px;
            height: 100px;
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .navbar.li:hover{
            background-color: darkorange;
            color: black;
            transition: 0,2s
            ;
        }

        .navbar.a{
            text-decoration: none;
            color: inherit;
        }

         .navbar.a:hover{
            text-decoration: none;
        }

        .container{
            display: flex;
            width: 100%;
            height: 800px;
            background-color: lightblue;
        }

        .left{
            width: 20%;
            background-color: lightcoral;
        }

        .middle{
            width: 40%;
            background-color: lightpink;
        }

        .right{
            width: 40%;
            background-color: lightgrey;
        }
    </style>
</head>
<body>
    
    <header>
        <nav class="navbar">
            <ul>
                <li><img src="logo.png" alt="Logo"></li>
                <li><a href="">Ana Sayfa</a></li>
                <li><a href="biz.kimiz.html">Biz Kimiz</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="left"></div>
        <div class="middle"></div>
        <div class="right"></div>
    </div>
</body>
</html>
