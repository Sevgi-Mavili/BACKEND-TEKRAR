<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>

    <style>
        .container{
            background-color: lightgray;
            width: 800px;
            height: 200px;

            display: flex;

            /* yatayda ortalama */
            justify-content: center;

            /* dikeyde ortalama */
            align-items: center;

            /* flex-direction: column; */
        }

        .box{
            box-sizing: border-box;
            background-color: grey;
            color: white;
            height: 100px;
            width: 100px;
            padding-top: 5px;
            padding-left: 10px;

            border: 1px solid black;
            /* margin-right: 10px; */
            /* margin-top: 20px;
            margin-bottom: 55px; */

            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="flex: 2;" class="box">1</div>
        <div style="flex: 3;" class="box">2</div>
        <div style="flex: 1;" class="box">3</div>
    </div>
</body>
</html>
