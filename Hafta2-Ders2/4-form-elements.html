<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Elemanları</title>
</head>
<body>
    <!-- <form action="" method="get">
        <label for="i1">İsim</label>
        <input type="text" name="isim" id="i1" value="kemal">
        <br><br>
        <label for="i2">Yaş</label>
        <input type="number" name="yas" id="i2" value="123">
        <br><br>
        <input type="submit">
    </form> -->

    <form action="" method="post">
        <table>
            <tr>
                <td><label for="i1">İsim</label></td>
                <td><input type="text" name="name" id="i1 required"></td>
            </tr>
            <tr>
                <td><label for="i2">Email</label></td>
                <td><input type="email" name="email" id="i2"></td>
            </tr>
            <tr>
                <td><label for="i11">Telefon Numarası</label></td>
                <td><input type="tel" name="tel" id="i11"></td>
            </tr>
            <tr>
                <td><label for="i3">Şifre</label></td>
                <td><input type="password" name="password" id="i3"></td>
            </tr>
            <tr>
                <td><label for="i4">Skor</label></td>
                <td><input type="number" name="score" id="i4"></td>
            </tr>
            <tr>
                <td><label for="i5">Doğum Tarihi</label></td>
                <td><input type="date" name="birthDate" id="i5" min="2025-01-01" max="2026-04-02"></td>
            </tr>
            <tr>
                <td><label for="i6">Saat</label></td>
                <td><input type="time" name="time" id="i6"></td>
            </tr>
            <tr>
                <td><label for="i7">Ay</label></td>
                <td><input type="month" name="month" id="i7"></td>
            </tr>
            <tr>
                <td><label for="i8">Hafta</label></td>
                <td><input type="week" name="week" id="i8"></td>
            </tr>
            <tr>
                <td><label for="i9">Tarih-Saat</label></td>
                <td><input type="datetime-local" name="dateTime" id="i9"></td>
            </tr>
            <tr>
                <td><label for="i10">Renk</label></td>
                <td><input type="color" name="color" id="i10"></td>
            </tr>
            <tr>
                <td><label for="i12">Web Sitesi Adresi</label></td>
                <td><input type="url" name="web" id="i12"></td>
            </tr>
            <tr>
                <td><label for="search">Arama</label></td>
                <td><input type="search" name="search" id="search"></td>
            </tr>
            <tr>
                <td><label for="file">Profil Fotoğrafı</label></td>
                <td><input accept="application/pdf" type="file" name="file" id="file" multiple></td>
            </tr>
            <tr>
                <td><label for="">Bildiğiniz Diller:</label></td>
                <td>
                    <label for="tr">Türkçe</label><input type="checkbox" name="dil1" value="tr" id="tr">
                    <label for="en">İngilizce</label><input type="checkbox" name="dil2" value="en" id="en">
                    <label for="fr">Fransızca</label><input type="checkbox" name="dil3" value="fr" id="fr">
                </td>
            </tr>
            <tr>
                <td><label for="">Cinsiyet</label></td>
                <td>
                    <label for="f">Kadın</label><input type="radio" name="gender" value="f" id="f">
                    <label for="m">Erkek</label><input type="radio" name="gender" value="m" id="m">
                </td>
            </tr>
            <tr>
                <td><label for="">Şehir:</label></td>
                <td>
                    <select name="city" id="city">
                        <option value="34">İstanbul</option>
                        <option value="16">Bursa</option>
                        <option value="54">Sakarya</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="resume">Özgeçmiş</label></td>
                <td>
                    <textarea name="resume" id="resume"></textarea>
                </td>
            </tr>
            <tr>
                <td><label for="sound">Ses Seviyesi:</label></td>
                <td>
                    <input type="range" name="soundLevel" min="0" max="100" step="5" id="sound">
                </td>
            </tr>
            <tr>
                <td>
                    <input type="hidden" name="userId" min="0" max="100" step="5" id="sound">
                </td>
            </tr>

            <tr>
                <td collspan="2"><button type="submit">Gönder</button></td>
            </tr>
        </table>
    </form>
    
</body>
</html>
